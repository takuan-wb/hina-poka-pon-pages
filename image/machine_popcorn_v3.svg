<svg xmlns="http://www.w3.org/2000/svg" width="360" height="280" viewBox="0 0 360 280">
  <defs>
    <linearGradient id="cap" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff8da8"/>
      <stop offset="100%" stop-color="#ff5f84"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafdff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#dce9f7" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe9ee"/>
      <stop offset="100%" stop-color="#ffc6d2"/>
    </linearGradient>
  </defs>

  <!-- marquee top -->
  <ellipse cx="180" cy="42" rx="132" ry="28" fill="#ffd7e2"/>
