  <rect x="64" y="38" width="232" height="148" rx="20" fill="url(#glass)" stroke="#7894bf" stroke-width="6"/>
  <rect x="88" y="52" width="18" height="118" rx="9" fill="#ffffff" opacity="0.35"/>
  <rect x="254" y="52" width="10" height="118" rx="5" fill="#ffffff" opacity="0.22"/>

