  <rect x="130" y="18" width="100" height="22" rx="11" fill="#fff1a6" stroke="#d2a234" stroke-width="3"/>
  <circle cx="82" cy="38" r="6" fill="#ffe9a1"/>
  <circle cx="108" cy="30" r="5" fill="#ffe9a1"/>
  <circle cx="252" cy="30" r="5" fill="#ffe9a1"/>
  <circle cx="278" cy="38" r="6" fill="#ffe9a1"/>

